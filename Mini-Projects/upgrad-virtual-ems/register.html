<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register for Event - upGrad EMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">upGrad EMS</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="card shadow p-4">
      <h2 class="mb-4 text-center">Event Registration</h2>

      <form id="registrationForm">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Event ID</label>
            <input type="text" id="eventId" class="form-control" readonly>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" id="eventName" class="form-control" readonly>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Category</label>
            <input type="text" id="eventCategory" class="form-control" readonly>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Date</label>
            <input type="text" id="eventDate" class="form-control" readonly>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Time</label>
            <input type="text" id="eventTime" class="form-control" readonly>
          </div>
        </div>

        <hr>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" required>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" required>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="participantEmail" required>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100">Register</button>
      </form>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
