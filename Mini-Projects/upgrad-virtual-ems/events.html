<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Events - upGrad EMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">upGrad EMS</a>
      <div class="ms-auto">
        <button class="btn btn-light btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-5">

    <h2 class="mb-4 text-center">Admin Event Management</h2>

    <!-- Add / Update Event Form -->
    <div class="card shadow p-4 mb-5">
      <h4 class="mb-3" id="formTitle">Add New Event</h4>

      <form id="eventForm">
        <!-- Hidden field to track edit mode -->
        <input type="hidden" id="editMode" value="false">
        <input type="hidden" id="originalEventId">

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Event ID</label>
            <input type="text" id="newEventId" class="form-control" required>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" id="newEventName" class="form-control" required>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Category</label>
            <select id="newEventCategory" class="form-select" required>
              <option value="">Select Category</option>
              <option value="Tech & Innovations">Tech & Innovations</option>
              <option value="Industrial Events">Industrial Events</option>
            </select>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Event Date</label>
            <input type="date" id="newEventDate" class="form-control" required>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Event Time</label>
            <input type="time" id="newEventTime" class="form-control" required>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Event URL</label>
            <input type="url" id="newEventUrl" class="form-control" required>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Event</button>
          <button type="button" class="btn btn-secondary d-none" id="cancelEditBtn">Cancel Edit</button>
        </div>
      </form>
    </div>

    <!-- Search Section -->
    <div class="card shadow p-4 mb-4">
      <h4 class="mb-3">Search Events</h4>
      <div class="row">
        <div class="col-md-4 mb-3">
          <select id="searchType" class="form-select">
            <option value="all">All</option>
            <option value="id">By ID</option>
            <option value="name">By Name</option>
            <option value="category">By Category</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <input type="text" id="searchInput" class="form-control" placeholder="Enter search value">
        </div>

        <div class="col-md-2 mb-3">
          <button class="btn btn-success w-100" id="searchBtn">Search</button>
        </div>
      </div>
    </div>

    <!-- Event Cards -->
    <div class="row" id="adminEventsContainer">
      <!-- Dynamic event cards -->
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
