<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List - Add to Cart</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        .product {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        .message {
            color: green;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h2>
        🛒 Cart Items: <span id="cartCount">0</span>
    </h2>

    <div id="productList">

        <div class="product">
            <strong>Laptop</strong>
            <button class="addToCart">Add to Cart</button>
            <span class="message"></span>
        </div>

        <div class="product">
            <strong>Mobile</strong>
            <button class="addToCart">Add to Cart</button>
            <span class="message"></span>
        </div>

        <div class="product">
            <strong>Headphones</strong>
            <button class="addToCart">Add to Cart</button>
            <span class="message"></span>
        </div>

        <div class="product">
            <strong>Smart Watch</strong>
            <button class="addToCart">Add to Cart</button>
            <span class="message"></span>
        </div>

    </div>

    <script src="script2.js"></script>

</body>
</html>
